              - heading "2. Architectural Goals & Constraints" [level=2] [ref=e180]
              - list [ref=e181]:
                - listitem [ref=e182]:
                  - strong [ref=e183]: "Key Requirements:"
                  - text: Scalability, security, availability, performance, maintainability.
                - listitem [ref=e184]:
                  - strong [ref=e185]: "Constraints:"
                  - text: Budget, timeline, technology stack limitations, regulatory compliance.
              - heading "3. System Overview (Context Diagram)" [level=2] [ref=e186]
              - list [ref=e187]:
                - listitem [ref=e188]:
                  - strong [ref=e189]: "High-Level Diagram:"
                  - text: (Describe or include a C4 Context diagram)
                - listitem [ref=e190]:
                  - strong [ref=e191]: "External Actors:"
                  - text: Users, third-party services, external databases.
                - listitem [ref=e192]:
                  - strong [ref=e193]: "System Boundaries:"
                  - text: What is inside vs. outside the system.
              - heading "4. Technology Stack" [level=2] [ref=e194]
              - paragraph [ref=e195]: "| Layer | Technology Choices | Justification | |---------------|-------------------|---------------| | Frontend | React / Angular | [Reason] | | Backend | Node.js / Python | [Reason] | | Database | PostgreSQL / MongoDB | [Reason] | | Infrastructure| AWS / Azure / GCP | [Reason] | | CI/CD | GitHub Actions / Jenkins | [Reason] |"
              - heading "5. Component Architecture (Container Diagram)" [level=2] [ref=e196]
              - list [ref=e197]:
                - listitem [ref=e198]:
                  - paragraph [ref=e199]:
                    - strong [ref=e200]: "List of Core Components:"
                  - list [ref=e201]:
                    - listitem [ref=e202]:
                      - strong [ref=e203]: "API Gateway:"
