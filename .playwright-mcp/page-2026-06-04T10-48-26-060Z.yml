                    - listitem [ref=e204]:
                      - strong [ref=e205]: "User Service:"
                      - text: Handles authentication, authorization, and user profiles.
                    - listitem [ref=e206]:
                      - strong [ref=e207]: "Data Service:"
                      - text: Manages core business data and CRUD operations.
                    - listitem [ref=e208]:
                      - strong [ref=e209]: "Notification Service:"
                      - text: Sends emails, push notifications, or SMS.
                    - listitem [ref=e210]:
                      - strong [ref=e211]: "Message Queue:"
                      - text: (e.g., RabbitMQ, Kafka) for async processing.
                - listitem [ref=e212]:
                  - paragraph [ref=e213]:
                    - strong [ref=e214]: "Interactions:"
                    - text: Describe how components communicate (REST, gRPC, events).
              - heading "6. Data Architecture" [level=2] [ref=e215]
              - list [ref=e216]:
