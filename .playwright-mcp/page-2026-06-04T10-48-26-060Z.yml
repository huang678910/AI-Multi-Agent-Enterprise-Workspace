                - listitem [ref=e219]:
                  - strong [ref=e220]: "Data Flow:"
                  - text: How data moves between components.
                - listitem [ref=e221]:
                  - strong [ref=e222]: "Storage:"
                  - text: Relational DB, NoSQL, Object Storage (S3, Blob).
              - heading "7. Security Architecture" [level=2] [ref=e223]
              - list [ref=e224]:
